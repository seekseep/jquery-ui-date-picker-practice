<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>jQuery UI Datepicker Scroll Repro</title>

  <link rel="stylesheet"
        href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    .controls {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .controls label {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .controls input[type="number"] {
      width: 80px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>開始年 <input type="number" id="year-from" value="2016"></label>
    <label>終了年 <input type="number" id="year-to" value="2099"></label>
  </div>

  <input type="text" id="datepicker">

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js"></script>
  <script>
    $(function () {
      const $picker = $("#datepicker");
      const $from = $("#year-from");
      const $to = $("#year-to");

      function applyYearRange() {
        const from = $from.val();
        const to = $to.val();
        $picker.datepicker("option", "yearRange", from + ":" + to);
        $picker.datepicker("show");
      }

      $picker.datepicker({
        changeYear: true,
        changeMonth: true,
        yearRange: $from.val() + ":" + $to.val(),
        dateFormat: "yy/mm/dd"
      });

      $from.on("change", applyYearRange);
      $to.on("change", applyYearRange);

      $picker.datepicker("show");
    });
  </script>
</body>
</html>
